version: "3.9"

services:
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: saga-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

  mysql:
    image: mysql:8.4
    container_name: saga-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: order_db
    ports:
      - "3306:3306"

  mysql-inventory:
    image: mysql:8.4
    container_name: saga-mysql-inventory
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: inventory_db
    ports:
      - "3307:3306"

  postgres:
    image: postgres:16
    container_name: saga-postgres
    environment:
      POSTGRES_USER: saga
      POSTGRES_PASSWORD: saga
      POSTGRES_DB: payment_db
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: saga-redis
    ports:
      - "6379:6379"

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: saga-jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

  loki:
    image: grafana/loki:3.0.0
    container_name: saga-loki
    ports:
      - "3100:3100"

  grafana:
    image: grafana/grafana:11.0.0
    container_name: saga-grafana
    ports:
      - "3000:3000"
    depends_on:
      - jaeger
      - loki
